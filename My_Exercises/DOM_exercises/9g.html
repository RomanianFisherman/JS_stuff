
<!DOCTYPE html>
<html>
  <head>
    <title>DOM Projects</title>
  </head>
  <body>
    
    <p> Youtube Subscribe Button </p>
    <button onclick="
        Subscribe();
    " class="js-sub-button">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <input placeholder="Cost of order" class="js-cost-input" onkeydown="
        console.log('typing...');
        handleCostKeyDown(event);
    ">

    <button onclick="
        calculateTotal();
        ">Calculate</button>

    <p class="js-total-cost"> </p>

    <input placeholder="Type Something" class="js-some-text" onkeyup="
        console.log('typing...');
        handleTextKeyUp(event);
    ">

    <p class="js-message"> </p>

    <script>
        function handleTextKeyUp(event) {
            const InputElement = document.querySelector('.js-some-text');
            document.querySelector('.js-message').innerHTML = InputElement.value;
        }

        function handleCostKeyDown(event) {
            console.log(event.key);
            if (event.key === 'Enter') {
                calculateTotal();
            }
        }

        function calculateTotal() {
            const IElem = document.querySelector('.js-cost-input');
            let cost = Number(IElem.value);
            

            if (cost < 40) {
                cost += 10;
            }
            
            document.querySelector('.js-total-cost').innerHTML = `$${Math.round(cost * 100) / 100 }`;
        }

        function Subscribe() {
            const buttonElement = document.querySelector('.js-sub-button');
        
            if (buttonElement.innerHTML === 'Subscribe') {
                buttonElement.innerHTML = 'Subscribed';
            } else {
                buttonElement.innerHTML = 'Subscribe';
            }
        }
    </script>
  </body>
</html>
