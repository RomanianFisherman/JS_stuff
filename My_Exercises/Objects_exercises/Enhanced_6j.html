<!DOCTYPE html>
<html>
  <head></head>
  <body>

    <p>
        <button onclick="
            playGame('heads');
        ">
            heads
        </button>

        <button onclick="
            playGame('tails');
        "> 
            tails 
        </button>
    </p>

    <script>
        
        //here score is a reference so we can modify it even if it uses const
        const score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0
        };
        
        function playGame(guess) {
            const randomNumber = Math.random();
            const result = randomNumber < 0.5 ? 'heads' : 'tails';
            
            if (guess === result) {
                score.wins += 1;
                console.log(`You win!\n`); 
            } else {
                score.losses += 1;
                console.log(`You lose!\n`);
            }

            console.log(score);

            //8K
            localStorage.setItem('score', JSON.stringify(score));
      }

    </script>
  </body>
</html>
